# ==============================================================================
# CONFIGURAÇÃO DO MÓDULO MEDIA CONVERTER
# ==============================================================================
# Este diretório de configuração define as flags e comportamentos padrão do script.
#
# COMO FUNCIONA O DESTINO (OUTPUT)?
# Por padrão, todos os arquivos gerados serão salvos no MESMO DIRETÓRIO do original.
# O nome será o mesmo, apenas com a extensão modificada (ex: video.mp4 -> video.mp3).
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. SOBREPOSIÇÃO (OVERWRITE)
# ------------------------------------------------------------------------------
# Se OVERWRITE_EXISTING for true, o script não irá perguntar se deseja substituir 
# um arquivo já existente que tenha o mesmo nome do destino, ele simplesmente irá cobrir.
# Se false (padrão de segurança), você receberá um erro no terminal ou um aviso no 
# ffmpeg caso ele encontre um arquivo que já existe.
OVERWRITE_EXISTING=false

# ------------------------------------------------------------------------------
# 2. DELEÇÃO DO ARQUIVO ORIGINAL
# ------------------------------------------------------------------------------
# Se DELETE_ORIGINAL for true, o arquivo alvo será APAGADO depois que a conversão 
# for concluída com SUCESSO. 
# Se false (recomendado), você ficará com ambos os arquivos: o antigo .mp4 e o novo .mp3.
DELETE_ORIGINAL=false

# ------------------------------------------------------------------------------
# 3. QUALIDADE DE ÁUDIO (FFmpeg)
# ------------------------------------------------------------------------------
# Esta flag determina a taxa de bits (bitrate) para extrações de arquivos de áudio
# (como mp3, aac, ogg). 192k é um meio termo ideal (boa qualidade / tamanho justo).
# Você pode alterar para 320k para máxima qualidade ou 128k para economia extrema.
AUDIO_QUAL="192k"

# ------------------------------------------------------------------------------
# 4. FLAGS DO EBOOK-CONVERT (Calibre)
# ------------------------------------------------------------------------------
# Você pode injetar comportamentos avançados durante a conversão do EPUB/PDF.
# Exemplos do que colocar aqui:
# EBOOK_EXTRA_FLAGS="--remove-paragraph-spacing --smarten-punctuation"
# Se não deseja mudar nada na saída padrão, deixe um valor em branco.
EBOOK_EXTRA_FLAGS=""

# ------------------------------------------------------------------------------
# 5. MODO DEBUG
# ------------------------------------------------------------------------------
# Define se os scripts devem ecoar os comandos por baixo dos panos e mostrar logs 
# detalhados para debugging no terminal. Deixe false no uso do dia a dia.
DEBUG_MODE=false
